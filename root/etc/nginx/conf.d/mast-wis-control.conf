# /etc/nginx/conf.d/mast-wis-control.conf
# vi: se terse nows sts=4 sw=4 ts=4:

# Redirect plain HTTP → HTTPS
server {
    listen 80;
    listen 8000;
    server_name mast-wis-control.weizmann.ac.il mast-wis-control;
    return 301 https://mast-wis-control.weizmann.ac.il$request_uri;
}

server {
    set $proxy_port 443;
    set $proxy_external_ip 10.23.3.73;
    set $proxy_hostname mast-wis-control.weizmann.ac.il;

	if ($host != 'mast-wis-control.weizmann.ac.il') {
		return 301 https://mast-wis-control.weizmann.ac.il$request_uri;
	}

    listen 443 ssl;
    server_name mast-wis-control.weizmann.ac.il mast-wis-control;

    ssl_certificate     /etc/ssl/certs/mast-wis-control.crt;
    ssl_certificate_key /etc/ssl/private/mast-wis-control.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    location /static/ {
	proxy_pass http://localhost:8010/static/;
    }

    location / {
	return 301 https://mast-wis-control.weizmann.ac.il/mast-dash/;
    }


    # mast-dash (Django GUI)
    location /mast-dash/ {
	proxy_pass http://localhost:8010/;
	proxy_set_header Host $proxy_hostname;
	proxy_set_header X-Forwarded-Host $proxy_hostname;
	proxy_set_header X-Real-IP $remote_addr;
	proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
	proxy_set_header X-Forwarded-Proto $scheme;
	proxy_set_header X-Proxy-Base /mast-dash/;
	proxy_set_header X-Proxy-Port ${proxy_port};
	proxy_set_header X-Proxy-External-IP ${proxy_external_ip};
	proxy_set_header X-Forwarded-Port ${proxy_port};
    }


    location /mast-backend/ {
        proxy_pass http://localhost:8002/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Proxy-Base /mast-backend/;
        proxy_set_header X-Proxy-Port ${proxy_port};
        proxy_set_header X-Proxy-External-IP ${proxy_external_ip};
    }

    # wao-safety (Grafana)
    location /wao-safety/ {
        proxy_pass http://10.23.1.25:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Proxy-Base /wao-safety/;
        proxy_set_header X-Proxy-Port ${proxy_port};
        proxy_set_header X-Proxy-External-IP ${proxy_external_ip};
    }

    # resources (Grafana dashboards, embedded in iframe)
    location /resources/ {
	proxy_pass http://localhost:3000/grafana/dashboards/;
	proxy_set_header Host $proxy_hostname;
	proxy_set_header X-Real-IP $remote_addr;
	proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
	proxy_set_header X-Forwarded-Proto $scheme;
    }

	# Grafana (local, sub-pathed at /grafana/)
	location /grafana/ {
		proxy_pass http://localhost:3000/grafana/;
		proxy_set_header Host $proxy_hostname;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
		proxy_hide_header X-Frame-Options;
	}


    # mast-share (File System Service)
    location /mast-share/ {
        proxy_pass http://localhost:8008/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Proxy-Base /mast-share/;
        proxy_set_header X-Proxy-Port ${proxy_port};
        proxy_set_header X-Proxy-External-IP ${proxy_external_ip};
    }
}
